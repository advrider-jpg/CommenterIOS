name: iOS CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  swift-package:
    name: Swift package tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Resolve packages
        run: swift package resolve
      - name: Run Swift tests
        run: swift test
      - name: Build iOS app target
        run: xcodebuild -project CommenterIOS.xcodeproj -scheme CommenterIOS -destination 'generic/platform=iOS Simulator' build CODE_SIGNING_ALLOWED=NO
