name: iOS CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  privacy-manifest:
    name: Privacy manifest lint
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Lint PrivacyInfo.xcprivacy
        run: |
          set -euo pipefail
          plutil -lint Sources/CommenterIOSApp/Resources/PrivacyInfo.xcprivacy

  swift-package:
    name: Swift package tests
    runs-on: macos-15
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Print runner toolchain
        run: |
          swift --version || true
          xcodebuild -version || true
          xcrun --version || true
          xcrun simctl list runtimes || true
          xcrun simctl list devices available || true

      - name: Resolve packages
        run: swift package resolve

      - name: Run Swift tests
        run: |
          set -euo pipefail
          mkdir -p build
          swift test 2>&1 | tee build/swift-test.log

      - name: Dump Swift test tail
        if: failure()
        run: |
          echo "=== Swift test tail ==="
          tail -n 200 build/swift-test.log || true

      - name: Upload Swift test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: commenter-ios-swift-test-diagnostics
          path: build/swift-test.log
          if-no-files-found: warn

  ios-build:
    name: Build iOS app target
    runs-on: macos-15
    timeout-minutes: 35
    env:
      DERIVED_DATA_PATH: ${{ github.workspace }}/build/DerivedData
    steps:
      - uses: actions/checkout@v4

      - name: Print runner toolchain
        run: |
          swift --version || true
          xcodebuild -version || true
          xcrun --version || true
          xcrun simctl list runtimes || true
          xcrun simctl list devices available || true

      - name: Resolve packages
        run: swift package resolve

      - name: Build iOS app target
        run: |
          set -euo pipefail
          mkdir -p build
          xcodebuild \
            -project CommenterIOS.xcodeproj \
            -scheme CommenterIOS \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -resultBundlePath build/CommenterIOSBuild.xcresult \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            build \
            CODE_SIGNING_ALLOWED=NO | tee build/ios-ci-xcodebuild.log

      - name: Dump xcodebuild tail
        if: failure()
        run: |
          echo "=== iOS CI xcodebuild tail ==="
          tail -n 200 build/ios-ci-xcodebuild.log || true

      - name: Upload CI diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: commenter-ios-ci-diagnostics
          path: |
            build/ios-ci-xcodebuild.log
            build/CommenterIOSBuild.xcresult
          if-no-files-found: warn

  screenshots:
    name: Capture core app screenshots
    runs-on: macos-15
    timeout-minutes: 45
    needs: [swift-package, ios-build]
    if: ${{ always() }}
    env:
      COMMENTER_SCREENSHOT_DIR: ${{ github.workspace }}/build/screenshots
      DERIVED_DATA_PATH: ${{ github.workspace }}/build/DerivedData
    steps:
      - name: Fail fast when prerequisite CI failed
        if: ${{ needs.swift-package.result != 'success' || needs.ios-build.result != 'success' }}
        run: |
          echo "Skipping screenshot UI tests because prerequisite CI failed."
          echo "swift-package=${{ needs.swift-package.result }}"
          echo "ios-build=${{ needs.ios-build.result }}"
          exit 1

      - uses: actions/checkout@v4
        if: ${{ needs.swift-package.result == 'success' && needs.ios-build.result == 'success' }}

      - name: Print runner toolchain
        if: ${{ needs.swift-package.result == 'success' && needs.ios-build.result == 'success' }}
        run: |
          swift --version || true
          xcodebuild -version || true
          xcrun --version || true
          xcrun simctl list runtimes || true
          xcrun simctl list devices available || true

      - name: Resolve packages
        if: ${{ needs.swift-package.result == 'success' && needs.ios-build.result == 'success' }}
        run: swift package resolve

      - name: Select an available iPhone simulator
        if: ${{ needs.swift-package.result == 'success' && needs.ios-build.result == 'success' }}
        id: simulator
        run: |
          set -euo pipefail
          xcrun simctl shutdown all || true
          xcrun simctl list devices available -j > "$RUNNER_TEMP/simulators.json"
          udid="$(python3 - "$RUNNER_TEMP/simulators.json" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as handle:
              data = json.load(handle)
          candidates = []
          for runtime, devices in data.get("devices", {}).items():
              for device in devices:
                  name = device.get("name", "")
                  if device.get("isAvailable") and name.startswith("iPhone"):
                      candidates.append((runtime, name, device["udid"]))

          if not candidates:
              raise SystemExit("No available iPhone simulator found.")

          def score(candidate):
              runtime, name, _ = candidate
              return (runtime, name)

          print(sorted(candidates, key=score)[-1][2])
          PY
          )"
          xcrun simctl shutdown "$udid" || true
          xcrun simctl erase "$udid"
          xcrun simctl boot "$udid" || true
          xcrun simctl bootstatus "$udid" -b || true
          echo "destination=platform=iOS Simulator,id=$udid" >> "$GITHUB_OUTPUT"
          echo "Selected screenshot simulator: $udid"

      - name: Run screenshot UI tests
        if: ${{ needs.swift-package.result == 'success' && needs.ios-build.result == 'success' }}
        run: |
          set -euo pipefail
          mkdir -p "$COMMENTER_SCREENSHOT_DIR"
          mkdir -p build
          xcodebuild test \
            -project CommenterIOS.xcodeproj \
            -scheme CommenterIOS \
            -destination '${{ steps.simulator.outputs.destination }}' \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -only-testing:CommenterIOSScreenshotTests/CommenterIOSScreenshotTests/testCoreReportFlowScreenshots \
            -resultBundlePath build/CommenterIOSScreenshots.xcresult \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO | tee build/screenshot-xcodebuild.log

      - name: Dump screenshot xcodebuild tail
        if: ${{ failure() && needs.swift-package.result == 'success' && needs.ios-build.result == 'success' }}
        run: |
          echo "=== iOS screenshot xcodebuild tail ==="
          tail -n 200 build/screenshot-xcodebuild.log || true

      - name: Export screenshot PNGs from xcresult
        if: ${{ always() && needs.swift-package.result == 'success' && needs.ios-build.result == 'success' }}
        run: |
          set -euo pipefail
          attachment_dir="$RUNNER_TEMP/commenter-ios-xcresult-attachments"
          rm -rf "$attachment_dir"
          mkdir -p "$attachment_dir" "$COMMENTER_SCREENSHOT_DIR"

          if [ -d build/CommenterIOSScreenshots.xcresult ]; then
            xcrun xcresulttool export attachments \
              --path build/CommenterIOSScreenshots.xcresult \
              --output-path "$attachment_dir" || true
          else
            echo "No xcresult bundle found at build/CommenterIOSScreenshots.xcresult"
          fi

          python3 scripts/extract_core_screenshots.py "$attachment_dir" "$COMMENTER_SCREENSHOT_DIR"

      - name: Upload screenshots
        if: ${{ always() && needs.swift-package.result == 'success' && needs.ios-build.result == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: commenter-ios-core-screenshots
          path: |
            build/screenshots/*.png
            build/CommenterIOSScreenshots.xcresult
            build/screenshot-xcodebuild.log
          if-no-files-found: warn
