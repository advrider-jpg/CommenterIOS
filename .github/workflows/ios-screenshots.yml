name: iOS Screenshots

on:
  workflow_dispatch:

jobs:
  screenshots:
    name: Capture core app screenshots
    runs-on: macos-15
    timeout-minutes: 45
    env:
      COMMENTER_SCREENSHOT_DIR: ${{ github.workspace }}/build/screenshots
      DERIVED_DATA_PATH: ${{ github.workspace }}/build/DerivedData
    steps:
      - uses: actions/checkout@v4

      - name: Print runner toolchain
        run: |
          swift --version || true
          xcodebuild -version || true
          xcrun --version || true
          xcrun simctl list runtimes || true
          xcrun simctl list devices available || true

      - name: Resolve packages
        run: swift package resolve

      - name: Select an available iPhone simulator
        id: simulator
        run: |
          set -euo pipefail
          xcrun simctl list devices available -j > "$RUNNER_TEMP/simulators.json"
          udid="$(python3 - "$RUNNER_TEMP/simulators.json" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as handle:
              data = json.load(handle)
          candidates = []
          for runtime, devices in data.get("devices", {}).items():
              for device in devices:
                  name = device.get("name", "")
                  if device.get("isAvailable") and name.startswith("iPhone"):
                      candidates.append((runtime, name, device["udid"]))

          if not candidates:
              raise SystemExit("No available iPhone simulator found.")

          def score(candidate):
              runtime, name, _ = candidate
              return (runtime, name)

          print(sorted(candidates, key=score)[-1][2])
          PY
          )"
          xcrun simctl shutdown "$udid" || true
          xcrun simctl erase "$udid"
          echo "destination=platform=iOS Simulator,id=$udid" >> "$GITHUB_OUTPUT"
          echo "Selected screenshot simulator: $udid"

      - name: Run screenshot UI tests
        run: |
          set -euo pipefail
          mkdir -p "$COMMENTER_SCREENSHOT_DIR"
          mkdir -p build
          xcodebuild test \
            -project CommenterIOS.xcodeproj \
            -scheme CommenterIOS \
            -destination '${{ steps.simulator.outputs.destination }}' \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -only-testing:CommenterIOSScreenshotTests/CommenterIOSScreenshotTests/testCoreReportFlowScreenshots \
            -resultBundlePath build/CommenterIOSScreenshots.xcresult \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO | tee build/screenshot-xcodebuild.log

      - name: Dump screenshot xcodebuild tail
        if: failure()
        run: |
          echo "=== iOS screenshot xcodebuild tail ==="
          tail -n 200 build/screenshot-xcodebuild.log || true

      - name: Export screenshot PNGs from xcresult
        if: always()
        run: |
          set -euo pipefail
          attachment_dir="$RUNNER_TEMP/commenter-ios-xcresult-attachments"
          rm -rf "$attachment_dir"
          mkdir -p "$attachment_dir" "$COMMENTER_SCREENSHOT_DIR"

          if [ -d build/CommenterIOSScreenshots.xcresult ]; then
            xcrun xcresulttool export attachments \
              --path build/CommenterIOSScreenshots.xcresult \
              --output-path "$attachment_dir" || true
          else
            echo "No xcresult bundle found at build/CommenterIOSScreenshots.xcresult"
          fi

          python3 - "$attachment_dir" "$COMMENTER_SCREENSHOT_DIR" <<'PY'
          import json
          import os
          import re
          import shutil
          import sys

          attachment_dir, output_dir = sys.argv[1:3]
          manifest_path = os.path.join(attachment_dir, "manifest.json")
          screenshots = {}
          required = [
              "01-projects-empty",
              "02-worklist-no-project",
              "03-support-diagnostics",
              "04-project-created",
              "05-roster-before-student",
              "06-roster-student-entered",
              "07-subject-selected-english",
              "08-result-before-achievement",
              "09-result-ready-for-generation",
              "10-project-saved-before-generation",
              "11-generated-report-comment",
              "12-export-ready",
              "13-docx-prepared",
              "14-support-after-report",
          ]

          for name in required:
              existing = os.path.join(output_dir, f"{name}.png")
              if os.path.isfile(existing):
                  screenshots[name] = existing

          def walk(value):
              if isinstance(value, dict):
                  exported = value.get("exportedFileName")
                  suggested = value.get("suggestedHumanReadableName") or value.get("name")
                  if exported and suggested:
                      exported_path = os.path.join(attachment_dir, exported)
                      if os.path.isfile(exported_path) and exported.lower().endswith(".png"):
                          name = os.path.splitext(suggested)[0]
                          name = re.sub(r"_\d+_[0-9A-Fa-f-]{36}$", "", name)
                          if re.fullmatch(r"\d{2}-[A-Za-z0-9-]+", name):
                              screenshots[name] = exported_path
                  for child in value.values():
                      walk(child)
              elif isinstance(value, list):
                  for child in value:
                      walk(child)

          if os.path.exists(manifest_path):
              with open(manifest_path, encoding="utf-8") as handle:
                  walk(json.load(handle))
          else:
              print("xcresult attachment export did not produce manifest.json; falling back to recursive PNG scan.")

          for root, _, files in os.walk(attachment_dir):
              for filename in files:
                  if not filename.lower().endswith(".png"):
                      continue
                  source = os.path.join(root, filename)
                  name = os.path.splitext(filename)[0]
                  name = re.sub(r"_\d+_[0-9A-Fa-f-]{36}$", "", name)
                  if re.fullmatch(r"\d{2}-[A-Za-z0-9-]+", name):
                      screenshots.setdefault(name, source)

          missing = [name for name in required if name not in screenshots]
          if missing:
              print(f"Missing required core-flow screenshots after export fallback: {', '.join(missing)}")
              print("Found screenshots:", ", ".join(sorted(screenshots)) or "none")
              for root, _, files in os.walk(attachment_dir):
                  for filename in files[:50]:
                      print("attachment:", os.path.join(root, filename))

          for name, source in sorted(screenshots.items()):
              destination = os.path.join(output_dir, f"{name}.png")
              if os.path.abspath(source) != os.path.abspath(destination):
                  shutil.copy2(source, destination)
          PY

      - name: Verify screenshot output
        run: |
          set -euo pipefail
          count="$(find "$COMMENTER_SCREENSHOT_DIR" -type f -name '*.png' | wc -l | tr -d ' ')"
          test "$count" -ge 14
          required=(
            01-projects-empty
            02-worklist-no-project
            03-support-diagnostics
            04-project-created
            05-roster-before-student
            06-roster-student-entered
            07-subject-selected-english
            08-result-before-achievement
            09-result-ready-for-generation
            10-project-saved-before-generation
            11-generated-report-comment
            12-export-ready
            13-docx-prepared
            14-support-after-report
          )
          for name in "${required[@]}"; do
            if [ ! -s "$COMMENTER_SCREENSHOT_DIR/$name.png" ]; then
              echo "Missing screenshot: $COMMENTER_SCREENSHOT_DIR/$name.png"
              find "$COMMENTER_SCREENSHOT_DIR" -type f -print | sort || true
              exit 1
            fi
          done
          find "$COMMENTER_SCREENSHOT_DIR" -type f -name '*.png' | sort

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: commenter-ios-core-screenshots
          path: |
            build/screenshots/*.png
            build/CommenterIOSScreenshots.xcresult
            build/screenshot-xcodebuild.log
          if-no-files-found: warn
